name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: typecheck / test / lint / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck (@craft-codex/core)
        run: pnpm --filter @craft-codex/core typecheck

      - name: Test (@craft-codex/core)
        run: pnpm --filter @craft-codex/core test

      - name: Boundary check
        run: pnpm --filter @craft-codex/core boundary-check

      - name: Build (@craft-codex/core)
        run: pnpm --filter @craft-codex/core build

      - name: Typecheck (@craft-codex/tischler)
        run: pnpm --filter @craft-codex/tischler typecheck

      - name: Test (@craft-codex/tischler)
        run: pnpm --filter @craft-codex/tischler test

      - name: Lint (@craft-codex/tischler)
        run: pnpm --filter @craft-codex/tischler lint

      - name: Build (@craft-codex/tischler)
        run: pnpm --filter @craft-codex/tischler build

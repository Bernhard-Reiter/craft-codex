name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: typecheck / test / lint / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Guard against client-side API key env vars
        run: |
          # WebXR provider env vars must NEVER be prefixed NEXT_PUBLIC_ —
          # that would inline the value into the browser bundle and leak
          # the key to every visitor. Real provider calls happen only
          # server-side (Phase E API routes).
          if grep -rE "NEXT_PUBLIC_(ANTHROPIC|OPENAI|ELEVENLABS|GROQ|GEMINI|GOOGLE)[A-Z_]*(_API_KEY|_KEY|_TOKEN|_SECRET)" \
              apps/ packages/ 2>/dev/null; then
            echo "::error::Found NEXT_PUBLIC_* API-key env var — these are inlined into the browser bundle"
            echo "Move provider calls to Next.js API routes (server-side) and use plain ANTHROPIC_API_KEY etc."
            exit 1
          fi
          echo "✓ No public API key env vars found"

      - name: Dependency audit (high+, non-blocking)
        run: pnpm audit --audit-level=high || true

      - name: Typecheck (@craft-codex/core)
        run: pnpm --filter @craft-codex/core typecheck

      - name: Test (@craft-codex/core)
        run: pnpm --filter @craft-codex/core test

      - name: Boundary check
        run: pnpm --filter @craft-codex/core boundary-check

      - name: Build (@craft-codex/core)
        run: pnpm --filter @craft-codex/core build

      - name: Typecheck (@craft-codex/tischler)
        run: pnpm --filter @craft-codex/tischler typecheck

      - name: Test (@craft-codex/tischler)
        run: pnpm --filter @craft-codex/tischler test

      - name: i18n parity (DE ↔ EN message keys)
        run: pnpm --filter @craft-codex/tischler i18n:check

      - name: Lint (@craft-codex/tischler)
        run: pnpm --filter @craft-codex/tischler lint

      - name: Build (@craft-codex/tischler)
        run: pnpm --filter @craft-codex/tischler build

  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
